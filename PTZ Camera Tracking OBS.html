<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PTZ Tracking Control</title>

<style>
body{
margin:0;
padding:3px;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
background:#1f1f23;
color:#f1f1f1;
font-size:11px;
}

h3{
margin:0 0 3px;
font-size:10px;
font-weight:700;
text-transform:uppercase;
letter-spacing:.45px;
color:#a3a3ad;
}

.dock{
max-width:100%;
margin:0 auto;
}

.card{
background:#2b2b31;
border:1px solid #3b3b43;
border-radius:8px;
padding:4px;
margin-bottom:3px;
}

.cameraHead{
display:flex;
align-items:center;
justify-content:space-between;
gap:6px;
}

.dragHandle{
width:auto;
padding:2px 4px;
font-size:10px;
background:#3b3b43;
color:#d7d7df;
border:1px solid #4a4a54;
border-radius:4px;
cursor:grab;
line-height:1;
}

.dragHandle:active{
cursor:grabbing;
}

.actions{
display:grid;
grid-template-columns:1fr 1fr;
gap:3px;
}

#cameraList{
display:block;
}

.dropTarget{
outline:1px dashed #6b6b76;
}

.ipSettings{
display:grid;
grid-template-columns:1fr 1fr auto;
gap:3px;
}

.settingsActions{
margin-top:3px;
display:grid;
grid-template-columns:1fr 1fr;
gap:3px;
}

.settingsDock{
display:flex;
justify-content:flex-end;
margin-top:2px;
}

.settingsToggle{
width:auto;
padding:4px 6px;
font-size:12px;
background:#3b3b43;
color:#fff;
border:1px solid #4a4a54;
}

#settingsPanel{
display:none;
}

#settingsPanel.open{
display:block;
}

.ipInput{
background:#1d1d22;
border:1px solid #3b3b43;
border-radius:5px;
color:#f1f1f1;
font-size:10px;
padding:4px;
width:100%;
box-sizing:border-box;
}

.settingsBtn{
background:#3b3b43;
color:#fff;
font-size:10px;
font-weight:700;
padding:4px 6px;
border:none;
border-radius:5px;
cursor:pointer;
width:100%;
}

.removeBtn{
background:#5d2c2c;
}

.addBtn{
background:#284a7a;
}

button{
padding:4px;
font-size:13px;
font-weight:700;
border:none;
border-radius:5px;
cursor:pointer;
width:100%;
letter-spacing:0.2px;
transition:filter .15s ease;
line-height:1;
display:flex;
align-items:center;
justify-content:center;
}

button:hover{
filter:brightness(1.07);
}

button:disabled{
opacity:.6;
cursor:not-allowed;
filter:none;
}

.dragHandle:disabled{
opacity:.6;
cursor:not-allowed;
}

.stage{background:#248a3d;color:#fff;}
.audience{background:#1d6bb5;color:#fff;}
.stop{background:#b72d2d;color:#fff;}

.camA{background:#248a3d;color:#fff;}
.camB{background:#1d6bb5;color:#fff;}
.camC{background:#7b5bbf;color:#fff;}
.camD{background:#0c8a83;color:#fff;}

.emergency{
grid-template-columns:1fr;
}

.icon{
display:inline-flex;
align-items:center;
justify-content:center;
width:12px;
height:12px;
}

.sr-only{
position:absolute;
width:1px;
height:1px;
padding:0;
margin:-1px;
overflow:hidden;
clip:rect(0,0,0,0);
white-space:nowrap;
border:0;
}

#status{
padding:4px 5px;
background:#232329;
border-radius:6px;
font-weight:bold;
border:1px solid #3b3b43;
font-size:10px;
line-height:1.2;
}

#statusPanel{
margin:0 0 3px;
display:block;
text-align:left;
min-width:0;
position:sticky;
bottom:0;
z-index:5;
background:#1f1f23;
padding-top:2px;
}

#status{
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.ok{color:#81c784;}
.err{color:#ef9a9a;}
.info{color:#90caf9;}
.warn{color:#ffd54f;}
</style>
</head>

<body>

<div class="dock">
<div id="cameraList"></div>

<div class="card">
<h3>Emergency</h3>
<div class="actions emergency">

<button class="stop" onclick="allTrackingOff()" title="All Tracking OFF" aria-label="All Tracking OFF">
<span class="icon" aria-hidden="true">⚠</span>
<span class="sr-only">All Tracking OFF</span>
</button>

</div>
</div>

<div class="settingsDock">
<button id="settingsToggle" class="settingsToggle" onclick="toggleSettingsPanel()" title="Settings" aria-label="Settings" aria-expanded="false">
<span class="icon" aria-hidden="true">⚙</span>
<span class="sr-only">Open settings</span>
</button>
</div>

<div id="settingsPanel" class="card">
<h3>Camera Settings</h3>
<div id="cameraSettingsRows"></div>
<div class="settingsActions">
<button class="settingsBtn addBtn" onclick="addCameraRow()" title="Add Camera" aria-label="Add Camera">+ Camera</button>
<button class="settingsBtn" onclick="saveSettings()" title="Save Settings" aria-label="Save Settings">Save Settings</button>
</div>
</div>

<div id="statusPanel">
<div id="status" class="info">
Status: Ready
</div>
</div>
</div>

<script>

const LIVE_REFRESH_INTERVAL_MS = 7000
const CAMERA_STORAGE_KEY = "ptzTrackingCamerasV2"
const LEGACY_STORAGE_KEY = "ptzTrackingCameraIps"

const ENABLE_DOCK_HOTKEYS = true

const defaultCameras = [
{id:"cam_stage",name:"Stage Camera",ip:"192.168.1.108"},
{id:"cam_audience",name:"Audience Camera",ip:"192.168.1.109"}
]

const cameraConfig = {
cameras:[...defaultCameras]
}

let suppressLiveStatusUntil = 0
let liveStatusTimer = null
let settingsDraft = []
let draggedCameraId = null
let liveRefreshInProgress = false
const inFlightCameraIds = new Set()

function sanitizeIp(value){
const cleaned = (value || "").trim()
if(!cleaned) return ""

let host = cleaned.replace(/^https?:\/\//i,"")
host = host.split("/")[0]
host = host.split("?")[0]
host = host.split("#")[0]
return host.trim()
}

function sanitizeCameraName(value,fallback="Camera"){
const cleaned = (value || "").trim()
return cleaned || fallback
}

function createCameraId(){
return "cam_" + Date.now() + "_" + Math.floor(Math.random() * 10000)
}

function sanitizeCameraId(value){
const cleaned = String(value || "").trim()
if(/^[a-zA-Z0-9_-]+$/.test(cleaned)){
return cleaned
}
return createCameraId()
}

function escapeHtml(text){
return String(text)
.replaceAll("&","&amp;")
.replaceAll("<","&lt;")
.replaceAll(">","&gt;")
.replaceAll('"',"&quot;")
.replaceAll("'","&#039;")
}

function getCameraById(cameraId){
return cameraConfig.cameras.find(camera => camera.id === cameraId)
}

function getTrackButtonClass(index){
const classes = ["camA","camB","camC","camD"]
return classes[index % classes.length]
}

function renderCameraCards(){
const container = document.getElementById("cameraList")

if(cameraConfig.cameras.length === 0){
container.innerHTML = "<div class=\"card\"><h3>No Cameras</h3></div>"
return
}

container.innerHTML = cameraConfig.cameras.map((camera,index) => {
const nameEscaped = escapeHtml(camera.name)
const trackClass = getTrackButtonClass(index)
const isBusy = inFlightCameraIds.has(camera.id)
const disabledAttr = isBusy ? " disabled aria-disabled=\"true\"" : ""

return "<div class=\"card\">"
+ "<div class=\"cameraHead\">"
+ "<h3>" + nameEscaped + "</h3>"
+ "<button class=\"dragHandle\" draggable=\"true\" ondragstart=\"onCameraDragStart(event,'" + camera.id + "')\" ondragend=\"onCameraDragEnd(event)\" title=\"Drag to reorder\" aria-label=\"Drag to reorder\"" + disabledAttr + ">⋮⋮</button>"
+ "</div>"
+ "<div class=\"actions\">"
+ "<button class=\"" + trackClass + "\" onclick=\"trackOn('" + camera.id + "')\" title=\"" + nameEscaped + " Tracking ON\" aria-label=\"" + nameEscaped + " Tracking ON\"" + disabledAttr + ">"
+ "<span class=\"icon\" aria-hidden=\"true\">▶</span>"
+ "<span class=\"sr-only\">" + nameEscaped + " Tracking ON</span>"
+ "</button>"
+ "<button class=\"stop\" onclick=\"trackOff('" + camera.id + "')\" title=\"" + nameEscaped + " Tracking OFF\" aria-label=\"" + nameEscaped + " Tracking OFF\"" + disabledAttr + ">"
+ "<span class=\"icon\" aria-hidden=\"true\">■</span>"
+ "<span class=\"sr-only\">" + nameEscaped + " Tracking OFF</span>"
+ "</button>"
 + "</div>"
 + "</div>"
}).join("")

container.querySelectorAll(".card").forEach((card,index) => {
const camera = cameraConfig.cameras[index]
card.dataset.cameraId = camera.id
card.addEventListener("dragover",onCameraDragOver)
card.addEventListener("dragleave",onCameraDragLeave)
card.addEventListener("drop",onCameraDrop)
})

}


function onCameraDragStart(event,cameraId){
if(inFlightCameraIds.has(cameraId)){
event.preventDefault()
return
}
draggedCameraId = cameraId
event.dataTransfer.effectAllowed = "move"
event.dataTransfer.setData("text/plain",cameraId)
}

function onCameraDragEnd(){
draggedCameraId = null
document.querySelectorAll(".dropTarget").forEach(el => el.classList.remove("dropTarget"))
}

function onCameraDragOver(event){
event.preventDefault()
event.dataTransfer.dropEffect = "move"
const card = event.currentTarget
if(card && card.dataset.cameraId !== draggedCameraId){
card.classList.add("dropTarget")
}
}

function onCameraDragLeave(event){
event.currentTarget.classList.remove("dropTarget")
}

function onCameraDrop(event){
event.preventDefault()
const targetCard = event.currentTarget
targetCard.classList.remove("dropTarget")

const targetId = targetCard.dataset.cameraId
const sourceId = draggedCameraId || event.dataTransfer.getData("text/plain")

if(!sourceId || !targetId || sourceId === targetId){
return
}

const fromIndex = cameraConfig.cameras.findIndex(camera => camera.id === sourceId)
const toIndex = cameraConfig.cameras.findIndex(camera => camera.id === targetId)

if(fromIndex < 0 || toIndex < 0){
return
}

const [moved] = cameraConfig.cameras.splice(fromIndex,1)
cameraConfig.cameras.splice(toIndex,0,moved)

saveConfig()
renderCameraCards()

if(document.getElementById("settingsPanel").classList.contains("open")){
settingsDraft = cameraConfig.cameras.map(camera => ({...camera}))
renderSettingsRows()
}

updateStatus("Camera order updated","ok")
}
function renderSettingsRows(){
const rowsContainer = document.getElementById("cameraSettingsRows")

rowsContainer.innerHTML = settingsDraft.map((camera,index) => {
return "<div class=\"ipSettings\" style=\"margin-bottom:3px;\">"
+ "<input class=\"ipInput\" data-field=\"name\" data-index=\"" + index + "\" type=\"text\" placeholder=\"Camera Name\" aria-label=\"Camera Name\" value=\"" + escapeHtml(camera.name) + "\">"
+ "<input class=\"ipInput\" data-field=\"ip\" data-index=\"" + index + "\" type=\"text\" inputmode=\"decimal\" placeholder=\"Camera IP\" aria-label=\"Camera IP\" value=\"" + escapeHtml(camera.ip) + "\">"
+ "<button class=\"settingsBtn removeBtn\" onclick=\"removeCameraRow('" + camera.id + "')\" title=\"Remove Camera\" aria-label=\"Remove Camera\">✕</button>"
+ "</div>"
}).join("")
}

function loadConfig(){
try{
const raw = localStorage.getItem(CAMERA_STORAGE_KEY)

if(raw){
const parsed = JSON.parse(raw)
if(parsed && Array.isArray(parsed.cameras) && parsed.cameras.length > 0){
cameraConfig.cameras = parsed.cameras
.map(camera => ({
id:sanitizeCameraId(camera.id),
name:sanitizeCameraName(camera.name,"Camera"),
ip:sanitizeIp(camera.ip)
}))
.filter(camera => camera.ip)
}
}

if(cameraConfig.cameras.length === 0){
const legacyRaw = localStorage.getItem(LEGACY_STORAGE_KEY)
if(legacyRaw){
const legacy = JSON.parse(legacyRaw)
cameraConfig.cameras = [
{id:createCameraId(),name:sanitizeCameraName(legacy.stageName,"Stage Camera"),ip:sanitizeIp(legacy.stage || "192.168.1.108")},
{id:createCameraId(),name:sanitizeCameraName(legacy.audienceName,"Audience Camera"),ip:sanitizeIp(legacy.audience || "192.168.1.109")}
]
}
}

if(cameraConfig.cameras.length === 0){
cameraConfig.cameras = [...defaultCameras]
}
}catch(error){
cameraConfig.cameras = [...defaultCameras]
}
}

function saveConfig(){
localStorage.setItem(CAMERA_STORAGE_KEY,JSON.stringify({
cameras:cameraConfig.cameras
}))
}

function addCameraRow(){
settingsDraft.push({
id:createCameraId(),
name:"New Camera",
ip:""
})
renderSettingsRows()
}

function removeCameraRow(cameraId){
if(settingsDraft.length <= 1){
updateStatus("At least one camera is required","warn")
return
}

settingsDraft = settingsDraft.filter(camera => camera.id !== cameraId)
renderSettingsRows()
}

function collectSettingsRows(){
const nameInputs = document.querySelectorAll("#cameraSettingsRows input[data-field='name']")
const ipInputs = document.querySelectorAll("#cameraSettingsRows input[data-field='ip']")

const updated = settingsDraft.map((camera,index) => {
const name = sanitizeCameraName(nameInputs[index].value,"Camera")
const ip = sanitizeIp(ipInputs[index].value)
return {id:camera.id,name:name,ip:ip}
})

return updated
}

function saveSettings(){
const updatedCameras = collectSettingsRows()

if(updatedCameras.some(camera => !camera.ip)){
updateStatus("Please enter IP address for all cameras","err")
return
}

if(updatedCameras.length === 0){
updateStatus("Please add at least one camera","err")
return
}

cameraConfig.cameras = updatedCameras
saveConfig()
renderCameraCards()
updateStatus("Camera settings saved","ok")
refreshLiveTrackingStatus()

const panel = document.getElementById("settingsPanel")
const toggleBtn = document.getElementById("settingsToggle")
if(panel.classList.contains("open")){
panel.classList.remove("open")
toggleBtn.setAttribute("aria-expanded","false")
}
}

function toggleSettingsPanel(){
const panel = document.getElementById("settingsPanel")
const toggleBtn = document.getElementById("settingsToggle")
const isOpen = panel.classList.toggle("open")
toggleBtn.setAttribute("aria-expanded", String(isOpen))

if(isOpen){
settingsDraft = cameraConfig.cameras.map(camera => ({...camera}))
renderSettingsRows()
}
}

function updateStatus(text,type="info"){
const status = document.getElementById("status")
status.className = type
const fullText = "Status: " + text
status.innerText = fullText
status.title = fullText
}

function buildTrackingUrl(ip,mode){
return "http://"+ip+"/cgi-bin/param.cgi?set_overlay&autotracking&"+mode+"&_="+Date.now()
}

function buildTrackingStatusUrls(ip){
const base = "http://" + ip + "/cgi-bin/param.cgi"
const nonce = "&_=" + Date.now()
return [
base + "?get_overlay&autotracking" + nonce,
base + "?get_overlay" + nonce,
base + "?get_autotracking" + nonce
]
}

function parseTrackingState(rawText){
const text = (rawText || "").toLowerCase()
if(!text) return null

if(/autotracking[^\n\r=:\s]*[=:\s]+(on|1|true|enable|enabled)/.test(text) || /\btracking\s*(on|enabled)\b/.test(text)){
return "ON"
}

if(/autotracking[^\n\r=:\s]*[=:\s]+(off|0|false|disable|disabled)/.test(text) || /\btracking\s*(off|disabled)\b/.test(text)){
return "OFF"
}

if(/\bautotracking\b/.test(text) && /\bon\b/.test(text)) return "ON"
if(/\bautotracking\b/.test(text) && /\boff\b/.test(text)) return "OFF"

return null
}

async function getCameraTrackingState(ip,name){
const urls = buildTrackingStatusUrls(ip)

for(const url of urls){
try{
const response = await fetchWithTimeout(url,{mode:"cors",cache:"no-store"},3500)
if(!response.ok) continue

const responseText = await response.text().catch(()=>"")
const state = parseTrackingState(responseText)

if(state){
return {ok:true,state:state,readable:true}
}
}catch(error){
if(error && error.name === "AbortError"){
return {ok:false,state:"NO RESPONSE",readable:false}
}
}
}

return {ok:false,state:"UNAVAILABLE",readable:false}
}

function getLiveCombinedType(stage,audience){
if(stage === "NO RESPONSE" || audience === "NO RESPONSE") return "err"
if(stage === "UNAVAILABLE" || audience === "UNAVAILABLE") return "warn"
return "info"
}

async function refreshLiveTrackingStatus(){
if(Date.now() < suppressLiveStatusUntil) return
if(liveRefreshInProgress) return
liveRefreshInProgress = true

try{
if(cameraConfig.cameras.length === 0){
updateStatus("No cameras configured","warn")
return
}

const results = await Promise.all(
cameraConfig.cameras.map(async camera => {
const state = await getCameraTrackingState(camera.ip,camera.name)
return {camera:camera,state:state}
})
)

const labels = results.map(item => item.camera.name + ": " + item.state.state)
const statesOnly = results.map(item => item.state.state)
const statusType = statesOnly.includes("NO RESPONSE")
? "err"
: (statesOnly.includes("UNAVAILABLE") ? "warn" : "info")

if(results.every(item => !item.state.ok)){
updateStatus("Live status unavailable (CORS blocked or no response)",statusType)
}else{
updateStatus("Live • " + labels.join(" | "),statusType)
}
}finally{
liveRefreshInProgress = false
}
}

function scheduleLiveTrackingStatus(){
if(liveStatusTimer){
clearInterval(liveStatusTimer)
}
liveStatusTimer = setInterval(refreshLiveTrackingStatus,LIVE_REFRESH_INTERVAL_MS)
refreshLiveTrackingStatus()
}

function getCameraReplyMessage(rawText){
const text = (rawText || "").trim().replace(/\s+/g," ")
if(!text) return "Success"
return text.length > 70 ? text.slice(0,67) + "..." : text
}

async function fetchWithTimeout(url,options={},timeoutMs=4000){
const controller = new AbortController()
const timer = setTimeout(() => controller.abort(), timeoutMs)

try{
return await fetch(url,{...options,signal:controller.signal})
}finally{
clearTimeout(timer)
}
}

async function requestCameraWithFeedback(url){
try{
const response = await fetchWithTimeout(url,{mode:"cors",cache:"no-store"},4000)
const responseText = await response.text().catch(()=>"")

if(!response.ok){
throw new Error("HTTP " + response.status)
}

return {
ok:true,
confirmed:true,
reply:getCameraReplyMessage(responseText)
}
}catch(corsOrHttpError){
try{
await fetchWithTimeout(url,{mode:"no-cors",cache:"no-store"},4000)
return {
ok:true,
confirmed:false,
reply:"Command sent (camera response blocked by CORS in OBS)"
}
}catch(networkError){
const timeout = networkError && networkError.name === "AbortError"
return {
ok:false,
confirmed:false,
reply:timeout ? "No response (request timed out)" : "Network error / camera unreachable"
}
}
}
}

async function sendTrackingCommand(cameraId,ip,name,mode){
const action = mode === "on" ? "enable" : "disable"
const url = buildTrackingUrl(ip,mode)

inFlightCameraIds.add(cameraId)
renderCameraCards()
try{
updateStatus(name + ": Sending command...","info")
suppressLiveStatusUntil = Date.now() + 3000

const result = await requestCameraWithFeedback(url)

if(result.ok && result.confirmed){
updateStatus("✅ " + name + " tracking " + (mode === "on" ? "enabled" : "disabled") + " | Camera: " + result.reply,"ok")
}else if(result.ok && !result.confirmed){
updateStatus("⚠ " + name + ": " + result.reply,"warn")
}else{
updateStatus("❌ Failed to " + action + " tracking for " + name,"err")
}
}finally{
inFlightCameraIds.delete(cameraId)
renderCameraCards()
}

setTimeout(() => {
refreshLiveTrackingStatus()
}, 1200)
}

function trackOn(cameraKey){
const camera = getCameraById(cameraKey)
if(!camera){
updateStatus("Camera not found","err")
return
}
sendTrackingCommand(camera.id,camera.ip,camera.name,"on")
}

function trackOff(cameraKey){
const camera = getCameraById(cameraKey)
if(!camera){
updateStatus("Camera not found","err")
return
}
sendTrackingCommand(camera.id,camera.ip,camera.name,"off")
}

function isTypingTarget(element){
if(!element) return false
const tag = String(element.tagName || "").toLowerCase()
return tag === "input" || tag === "textarea" || element.isContentEditable === true
}

function handleDockHotkeys(event){
if(!ENABLE_DOCK_HOTKEYS) return
if(!event) return
if(isTypingTarget(event.target)) return

// Hotkeys only when dock is focused (this page has keyboard focus).
// Mapping:
// - Ctrl+Alt+1..9 => Tracking ON for camera index 1..9
// - Ctrl+Alt+Shift+1..9 => Tracking OFF for camera index 1..9
// - Ctrl+Alt+0 => ALL OFF
const isCtrlAlt = event.ctrlKey && event.altKey
if(!isCtrlAlt) return

const key = event.key
if(!/^[0-9]$/.test(key)) return

event.preventDefault()
event.stopPropagation()

if(key === "0"){
allTrackingOff()
return
}

const index = Number(key) - 1
const camera = cameraConfig.cameras[index]

if(!camera){
updateStatus("No camera mapped to " + key,"warn")
return
}

if(event.shiftKey){
trackOff(camera.id)
}else{
trackOn(camera.id)
}
}

async function allTrackingOff(){
updateStatus("Sending ALL TRACKING OFF...","info")
suppressLiveStatusUntil = Date.now() + 4000

if(cameraConfig.cameras.length === 0){
updateStatus("No cameras configured","warn")
return
}

cameraConfig.cameras.forEach(camera => inFlightCameraIds.add(camera.id))
renderCameraCards()

try{
const promises = cameraConfig.cameras.map(camera =>
requestCameraWithFeedback(buildTrackingUrl(camera.ip,"off"))
)

const results = await Promise.allSettled(promises)

const failedNames = []
const unconfirmedNames = []

results.forEach((result,index) => {
const cameraName = cameraConfig.cameras[index].name
if(result.status !== "fulfilled" || !result.value.ok){
failedNames.push(cameraName)
return
}

if(!result.value.confirmed){
unconfirmedNames.push(cameraName)
}
})

if(failedNames.length === 0 && unconfirmedNames.length === 0){
updateStatus("✅ ALL OFF successful: " + cameraConfig.cameras.map(camera => camera.name).join(", "),"ok")
}else if(failedNames.length === 0){
updateStatus("⚠ OFF sent, CORS blocked confirmation: " + unconfirmedNames.join(", "),"warn")
}else{
updateStatus("❌ ALL OFF failed: " + failedNames.join(", "),"err")
}
}finally{
cameraConfig.cameras.forEach(camera => inFlightCameraIds.delete(camera.id))
renderCameraCards()
}

setTimeout(() => {
refreshLiveTrackingStatus()
}, 1500)
}

loadConfig()
renderCameraCards()
scheduleLiveTrackingStatus()

document.addEventListener("keydown",handleDockHotkeys,{capture:true})

</script>

</body>
</html>
