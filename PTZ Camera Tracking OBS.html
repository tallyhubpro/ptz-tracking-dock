<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PTZ Tracking</title>

<style>
body{
margin:0;
padding:6px;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
background:#23262b;
color:#f3f4f6;
font-size:12px;
}

.dock{
max-width:100%;
margin:0 auto;
display:flex;
flex-direction:column;
gap:6px;
}

.topBar{
display:flex;
justify-content:flex-end;
}

.settingsToggle{
width:24px;
height:24px;
padding:0;
font-size:13px;
line-height:1;
border:1px solid #5a606d;
border-radius:4px;
background:#353b46;
color:#f3f4f6;
cursor:pointer;
}

.cameraList{
display:flex;
flex-direction:column;
gap:4px;
overflow:visible;
flex:0 0 auto;
min-height:0;
max-height:none;
}

.cameraRow{
display:flex;
align-items:center;
justify-content:space-between;
gap:6px;
padding:2px 0;
}

.cameraName{
font-size:12px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
padding-right:6px;
}

.settingsRow{
display:grid;
grid-template-columns:1fr 1fr;
gap:6px;
padding:3px;
border-radius:4px;
border:1px solid transparent;
}

.settingsRow.selected{
border-color:#5a606d;
background:#2a2f37;
}

.ipInput{
background:#181b21;
border:1px solid #4a505d;
border-radius:4px;
color:#f3f4f6;
font-size:12px;
padding:5px 6px;
width:100%;
box-sizing:border-box;
}

.btn{
background:#3a404b;
color:#f3f4f6;
font-size:12px;
font-weight:600;
padding:5px 8px;
border:1px solid #5a606d;
border-radius:4px;
cursor:pointer;
}

.btn:hover{
filter:brightness(1.07);
}

button:disabled{
opacity:.6;
cursor:not-allowed;
filter:none;
}

.allOffBtn{
width:100%;
padding:6px 8px;
font-size:12px;
font-weight:700;
border:1px solid #5a606d;
border-radius:4px;
background:#434a57;
color:#f3f4f6;
cursor:pointer;
}

.toggleOn{
background:#3a9a3f;
border:1px solid #2e7d32;
color:#fff;
min-width:72px;
padding:3px 10px;
border-radius:11px;
font-size:12px;
font-weight:700;
cursor:pointer;
}

.toggleOff{
background:#555b66;
border:1px solid #6b7280;
color:#f3f4f6;
min-width:72px;
padding:3px 10px;
border-radius:11px;
font-size:12px;
font-weight:700;
cursor:pointer;
}

#status{
padding:2px 0;
font-size:12px;
line-height:1.3;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.ok{color:#a5d6a7;}
.err{color:#ef9a9a;}
.info{color:#e5e7eb;}
.warn{color:#ffe082;}

.settingsModal{
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
display:none;
align-items:center;
justify-content:center;
padding:12px;
z-index:20;
}

.settingsModal.open{
display:flex;
}

.settingsDialog{
width:min(560px,100%);
background:#2b3039;
border:1px solid #5a606d;
border-radius:6px;
padding:10px;
box-sizing:border-box;
}

.dialogTitle{
font-size:13px;
font-weight:700;
margin-bottom:8px;
}

.dialogBody{
display:grid;
grid-template-columns:1fr auto;
gap:8px;
}

.settingsTable{
display:flex;
flex-direction:column;
gap:4px;
max-height:260px;
overflow:auto;
}

.toolsColumn{
display:flex;
flex-direction:column;
gap:4px;
}

.toolsColumn .btn{
width:34px;
padding:5px 0;
}

.dialogActions{
display:flex;
justify-content:flex-end;
gap:6px;
margin-top:10px;
}
</style>
</head>

<body>

<div class="dock">
<div class="topBar">
<button id="settingsToggle" class="settingsToggle" onclick="openSettingsPanel()" title="Settings" aria-label="Settings" aria-expanded="false">⚙</button>
</div>

<div id="cameraList" class="cameraList"></div>

<button class="allOffBtn" onclick="allTrackingOff()" title="All Tracking OFF" aria-label="All Tracking OFF">ALL OFF</button>

<div id="status" class="info">
Status: Ready
</div>
</div>

<div id="settingsModal" class="settingsModal" role="dialog" aria-modal="true" aria-label="PTZ Tracking Cameras">
<div class="settingsDialog">
<div class="dialogTitle">PTZ Tracking Cameras</div>
<div class="dialogBody">
<div id="cameraSettingsRows" class="settingsTable"></div>
<div class="toolsColumn">
<button class="btn" onclick="addCameraRow()" title="Add">+</button>
<button class="btn" onclick="removeCameraRow()" title="Remove">-</button>
<button class="btn" onclick="moveSettingsRow(-1)" title="Move Up">↑</button>
<button class="btn" onclick="moveSettingsRow(1)" title="Move Down">↓</button>
</div>
</div>
<div class="dialogActions">
<button class="btn" onclick="cancelSettings()">Cancel</button>
<button class="btn" onclick="saveSettings()">Save</button>
</div>
</div>
</div>

<script>

const LIVE_REFRESH_INTERVAL_MS = 7000
const CAMERA_STORAGE_KEY = "ptzTrackingCamerasV2"
const LEGACY_STORAGE_KEY = "ptzTrackingCameraIps"

const ENABLE_DOCK_HOTKEYS = true

const defaultCameras = [
{id:"cam_stage",name:"Stage Camera",ip:"192.168.1.108"},
{id:"cam_audience",name:"Audience Camera",ip:"192.168.1.109"}
]

const cameraConfig = {
cameras:[...defaultCameras]
}

let suppressLiveStatusUntil = 0
let liveStatusTimer = null
let settingsDraft = []
let selectedSettingsIndex = 0
let liveRefreshInProgress = false
const inFlightCameraIds = new Set()
const cameraTrackingState = new Map()

function sanitizeIp(value){
const cleaned = (value || "").trim()
if(!cleaned) return ""

let host = cleaned.replace(/^https?:\/\//i,"")
host = host.split("/")[0]
host = host.split("?")[0]
host = host.split("#")[0]
return host.trim()
}

function sanitizeCameraName(value,fallback="Camera"){
const cleaned = (value || "").trim()
return cleaned || fallback
}

function createCameraId(){
return "cam_" + Date.now() + "_" + Math.floor(Math.random() * 10000)
}

function sanitizeCameraId(value){
const cleaned = String(value || "").trim()
if(/^[a-zA-Z0-9_-]+$/.test(cleaned)){
return cleaned
}
return createCameraId()
}

function escapeHtml(text){
return String(text)
.replaceAll("&","&amp;")
.replaceAll("<","&lt;")
.replaceAll(">","&gt;")
.replaceAll('"',"&quot;")
.replaceAll("'","&#039;")
}

function getCameraById(cameraId){
return cameraConfig.cameras.find(camera => camera.id === cameraId)
}

function renderCameraCards(){
const container = document.getElementById("cameraList")

if(cameraConfig.cameras.length === 0){
container.innerHTML = "<div class=\"cameraRow\"><span class=\"cameraName\">No Cameras</span></div>"
return
}

container.innerHTML = cameraConfig.cameras.map((camera) => {
const nameEscaped = escapeHtml(camera.name)
const isBusy = inFlightCameraIds.has(camera.id)
const disabledAttr = isBusy ? " disabled aria-disabled=\"true\"" : ""
const isOn = cameraTrackingState.get(camera.id) === true
const toggleClass = isOn ? "toggleOn" : "toggleOff"
const toggleLabel = isOn ? "ON" : "OFF"
const toggleTitle = isOn
? (nameEscaped + " Tracking ON (click to disable)")
: (nameEscaped + " Tracking OFF (click to enable)")

return "<div class=\"cameraRow\">"
+ "<span class=\"cameraName\">" + nameEscaped + "</span>"
+ "<button class=\"" + toggleClass + "\" onclick=\"toggleTracking('" + camera.id + "')\" title=\"" + toggleTitle + "\" aria-label=\"" + toggleTitle + "\"" + disabledAttr + ">" + toggleLabel + "</button>"
 + "</div>"
}).join("")
}

function renderSettingsRows(){
const rowsContainer = document.getElementById("cameraSettingsRows")

rowsContainer.innerHTML = settingsDraft.map((camera,index) => {
const selectedClass = selectedSettingsIndex === index ? " selected" : ""
return "<div class=\"settingsRow" + selectedClass + "\" onclick=\"selectSettingsRow(" + index + ")\">"
+ "<input class=\"ipInput\" data-field=\"name\" data-index=\"" + index + "\" type=\"text\" placeholder=\"Name\" aria-label=\"Camera Name\" value=\"" + escapeHtml(camera.name) + "\" onfocus=\"selectSettingsRow(" + index + ")\">"
+ "<input class=\"ipInput\" data-field=\"ip\" data-index=\"" + index + "\" type=\"text\" placeholder=\"Host/IP\" aria-label=\"Camera Host or IP\" value=\"" + escapeHtml(camera.ip) + "\" onfocus=\"selectSettingsRow(" + index + ")\">"
+ "</div>"
}).join("")
}

function selectSettingsRow(index){
if(index < 0 || index >= settingsDraft.length) return
selectedSettingsIndex = index
renderSettingsRows()
}

function loadConfig(){
try{
const raw = localStorage.getItem(CAMERA_STORAGE_KEY)

if(raw){
const parsed = JSON.parse(raw)
if(parsed && Array.isArray(parsed.cameras) && parsed.cameras.length > 0){
cameraConfig.cameras = parsed.cameras
.map(camera => ({
id:sanitizeCameraId(camera.id),
name:sanitizeCameraName(camera.name,"Camera"),
ip:sanitizeIp(camera.ip)
}))
.filter(camera => camera.ip)
}
}

if(cameraConfig.cameras.length === 0){
const legacyRaw = localStorage.getItem(LEGACY_STORAGE_KEY)
if(legacyRaw){
const legacy = JSON.parse(legacyRaw)
cameraConfig.cameras = [
{id:createCameraId(),name:sanitizeCameraName(legacy.stageName,"Stage Camera"),ip:sanitizeIp(legacy.stage || "192.168.1.108")},
{id:createCameraId(),name:sanitizeCameraName(legacy.audienceName,"Audience Camera"),ip:sanitizeIp(legacy.audience || "192.168.1.109")}
]
}
}

if(cameraConfig.cameras.length === 0){
cameraConfig.cameras = [...defaultCameras]
}
}catch(error){
cameraConfig.cameras = [...defaultCameras]
}
}

function saveConfig(){
localStorage.setItem(CAMERA_STORAGE_KEY,JSON.stringify({
cameras:cameraConfig.cameras
}))
}

function addCameraRow(){
settingsDraft.push({
id:createCameraId(),
name:"New Camera",
ip:""
})
selectedSettingsIndex = settingsDraft.length - 1
renderSettingsRows()
}

function removeCameraRow(){
if(settingsDraft.length <= 1){
updateStatus("At least one camera is required","warn")
return
}

settingsDraft.splice(selectedSettingsIndex,1)
if(selectedSettingsIndex >= settingsDraft.length){
selectedSettingsIndex = settingsDraft.length - 1
}
renderSettingsRows()
}

function moveSettingsRow(delta){
const target = selectedSettingsIndex + delta
if(selectedSettingsIndex < 0 || selectedSettingsIndex >= settingsDraft.length) return
if(target < 0 || target >= settingsDraft.length) return

const moved = settingsDraft[selectedSettingsIndex]
settingsDraft[selectedSettingsIndex] = settingsDraft[target]
settingsDraft[target] = moved
selectedSettingsIndex = target
renderSettingsRows()
}

function collectSettingsRows(){
const nameInputs = document.querySelectorAll("#cameraSettingsRows input[data-field='name']")
const ipInputs = document.querySelectorAll("#cameraSettingsRows input[data-field='ip']")

const updated = settingsDraft.map((camera,index) => {
const name = sanitizeCameraName(nameInputs[index].value,"Camera")
const ip = sanitizeIp(ipInputs[index].value)
return {id:camera.id,name:name,ip:ip}
})

return updated
}

function saveSettings(){
const updatedCameras = collectSettingsRows()

if(updatedCameras.some(camera => !camera.ip)){
updateStatus("Fill all Host/IP fields","err")
return
}

if(updatedCameras.length === 0){
updateStatus("Add at least one camera","err")
return
}

cameraConfig.cameras = updatedCameras
saveConfig()
renderCameraCards()
updateStatus("Camera settings saved","ok")
refreshLiveTrackingStatus()

closeSettingsPanel()
}

function openSettingsPanel(){
const panel = document.getElementById("settingsModal")
const toggleBtn = document.getElementById("settingsToggle")
panel.classList.add("open")
toggleBtn.setAttribute("aria-expanded","true")

settingsDraft = cameraConfig.cameras.map(camera => ({...camera}))
selectedSettingsIndex = 0
renderSettingsRows()
}

function closeSettingsPanel(){
const panel = document.getElementById("settingsModal")
const toggleBtn = document.getElementById("settingsToggle")
panel.classList.remove("open")
toggleBtn.setAttribute("aria-expanded","false")
}

function cancelSettings(){
closeSettingsPanel()
}

function updateStatus(text,type="info"){
const status = document.getElementById("status")
status.className = type
const prefix = type === "ok" ? "OK: " : (type === "err" ? "ERR: " : "Status: ")
const fullText = prefix + text
status.innerText = fullText
status.title = fullText
}

function buildTrackingUrl(ip,mode){
return "http://"+ip+"/cgi-bin/param.cgi?set_overlay&autotracking&"+mode+"&_="+Date.now()
}

function buildTrackingStatusUrls(ip){
const base = "http://" + ip + "/cgi-bin/param.cgi"
const nonce = "&_=" + Date.now()
return [
base + "?get_overlay&autotracking" + nonce,
base + "?get_overlay" + nonce,
base + "?get_autotracking" + nonce
]
}

function parseTrackingState(rawText){
const text = (rawText || "").toLowerCase()
if(!text) return null

if(/autotracking[^\n\r=:\s]*[=:\s]+(on|1|true|enable|enabled)/.test(text) || /\btracking\s*(on|enabled)\b/.test(text)){
return "ON"
}

if(/autotracking[^\n\r=:\s]*[=:\s]+(off|0|false|disable|disabled)/.test(text) || /\btracking\s*(off|disabled)\b/.test(text)){
return "OFF"
}

if(/\bautotracking\b/.test(text) && /\bon\b/.test(text)) return "ON"
if(/\bautotracking\b/.test(text) && /\boff\b/.test(text)) return "OFF"

return null
}

async function getCameraTrackingState(ip,name,cameraId){
const urls = buildTrackingStatusUrls(ip)

for(const url of urls){
try{
const response = await fetchWithTimeout(url,{mode:"cors",cache:"no-store"},3500)
if(!response.ok) continue

const responseText = await response.text().catch(()=>"")
const state = parseTrackingState(responseText)

if(state){
cameraTrackingState.set(cameraId, state === "ON")
return {ok:true,state:state,readable:true}
}
}catch(error){
if(error && error.name === "AbortError"){
return {ok:false,state:"NO RESPONSE",readable:false}
}
}
}

return {ok:false,state:"UNAVAILABLE",readable:false}
}

function getLiveCombinedType(stage,audience){
if(stage === "NO RESPONSE" || audience === "NO RESPONSE") return "err"
if(stage === "UNAVAILABLE" || audience === "UNAVAILABLE") return "warn"
return "info"
}

async function refreshLiveTrackingStatus(){
if(Date.now() < suppressLiveStatusUntil) return
if(liveRefreshInProgress) return
liveRefreshInProgress = true

try{
if(cameraConfig.cameras.length === 0){
updateStatus("No cameras","warn")
return
}

const results = await Promise.all(
cameraConfig.cameras.map(async camera => {
const state = await getCameraTrackingState(camera.ip,camera.name,camera.id)
return {camera:camera,state:state}
})
)

const labels = results.map(item => item.camera.name + ": " + item.state.state)
const statesOnly = results.map(item => item.state.state)
const statusType = statesOnly.includes("NO RESPONSE")
? "err"
: (statesOnly.includes("UNAVAILABLE") ? "warn" : "info")

if(results.every(item => !item.state.ok)){
updateStatus("Live status unavailable",statusType)
}else{
updateStatus("Live: " + labels.join(" | "),statusType)
}
}finally{
liveRefreshInProgress = false
}
}

function scheduleLiveTrackingStatus(){
if(liveStatusTimer){
clearInterval(liveStatusTimer)
}
liveStatusTimer = setInterval(refreshLiveTrackingStatus,LIVE_REFRESH_INTERVAL_MS)
refreshLiveTrackingStatus()
}

function getCameraReplyMessage(rawText){
const text = (rawText || "").trim().replace(/\s+/g," ")
if(!text) return "Success"
return text.length > 70 ? text.slice(0,67) + "..." : text
}

async function fetchWithTimeout(url,options={},timeoutMs=4000){
const controller = new AbortController()
const timer = setTimeout(() => controller.abort(), timeoutMs)

try{
return await fetch(url,{...options,signal:controller.signal})
}finally{
clearTimeout(timer)
}
}

async function requestCameraWithFeedback(url){
try{
const response = await fetchWithTimeout(url,{mode:"cors",cache:"no-store"},4000)
const responseText = await response.text().catch(()=>"")

if(!response.ok){
throw new Error("HTTP " + response.status)
}

return {
ok:true,
confirmed:true,
reply:getCameraReplyMessage(responseText)
}
}catch(corsOrHttpError){
try{
await fetchWithTimeout(url,{mode:"no-cors",cache:"no-store"},4000)
return {
ok:true,
confirmed:false,
reply:"Command sent (camera response blocked by CORS in OBS)"
}
}catch(networkError){
const timeout = networkError && networkError.name === "AbortError"
return {
ok:false,
confirmed:false,
reply:timeout ? "No response (request timed out)" : "Network error / camera unreachable"
}
}
}
}

async function sendTrackingCommand(cameraId,ip,name,mode){
const url = buildTrackingUrl(ip,mode)

inFlightCameraIds.add(cameraId)
renderCameraCards()
try{
updateStatus(name + ": Sending...","info")
suppressLiveStatusUntil = Date.now() + 3000

const result = await requestCameraWithFeedback(url)

if(result.ok && result.confirmed){
cameraTrackingState.set(cameraId, mode === "on")
updateStatus(name + ": " + (mode === "on" ? "ON" : "OFF"),"ok")
}else if(result.ok && !result.confirmed){
cameraTrackingState.set(cameraId, mode === "on")
updateStatus(name + ": Sent (unconfirmed)","warn")
}else{
updateStatus(name + ": Command failed","err")
}
}finally{
inFlightCameraIds.delete(cameraId)
renderCameraCards()
}

setTimeout(() => {
refreshLiveTrackingStatus()
}, 1200)
}

function trackOn(cameraKey){
const camera = getCameraById(cameraKey)
if(!camera){
updateStatus("Camera not found","err")
return
}
sendTrackingCommand(camera.id,camera.ip,camera.name,"on")
}

function trackOff(cameraKey){
const camera = getCameraById(cameraKey)
if(!camera){
updateStatus("Camera not found","err")
return
}
sendTrackingCommand(camera.id,camera.ip,camera.name,"off")
}

function toggleTracking(cameraKey){
const camera = getCameraById(cameraKey)
if(!camera){
updateStatus("Camera not found","err")
return
}

const currentOn = cameraTrackingState.get(camera.id) === true
sendTrackingCommand(camera.id,camera.ip,camera.name,currentOn ? "off" : "on")
}

function isTypingTarget(element){
if(!element) return false
const tag = String(element.tagName || "").toLowerCase()
return tag === "input" || tag === "textarea" || element.isContentEditable === true
}

function handleDockHotkeys(event){
if(!ENABLE_DOCK_HOTKEYS) return
if(!event) return
if(isTypingTarget(event.target)) return

// Hotkeys only when dock is focused (this page has keyboard focus).
// Mapping:
// - Ctrl+Alt+1..9 => Tracking ON for camera index 1..9
// - Ctrl+Alt+Shift+1..9 => Tracking OFF for camera index 1..9
// - Ctrl+Alt+0 => ALL OFF
const isCtrlAlt = event.ctrlKey && event.altKey
if(!isCtrlAlt) return

const key = event.key
if(!/^[0-9]$/.test(key)) return

event.preventDefault()
event.stopPropagation()

if(key === "0"){
allTrackingOff()
return
}

const index = Number(key) - 1
const camera = cameraConfig.cameras[index]

if(!camera){
updateStatus("No camera on key " + key,"warn")
return
}

if(event.shiftKey){
trackOff(camera.id)
}else{
toggleTracking(camera.id)
}
}

async function allTrackingOff(){
updateStatus("ALL OFF...","info")
suppressLiveStatusUntil = Date.now() + 4000

if(cameraConfig.cameras.length === 0){
updateStatus("No cameras","warn")
return
}

cameraConfig.cameras.forEach(camera => inFlightCameraIds.add(camera.id))
renderCameraCards()

try{
const promises = cameraConfig.cameras.map(camera =>
requestCameraWithFeedback(buildTrackingUrl(camera.ip,"off"))
)

const results = await Promise.allSettled(promises)

const failedNames = []
const unconfirmedNames = []

results.forEach((result,index) => {
const cameraName = cameraConfig.cameras[index].name
if(result.status !== "fulfilled" || !result.value.ok){
failedNames.push(cameraName)
return
}

if(!result.value.confirmed){
unconfirmedNames.push(cameraName)
}
})

if(failedNames.length === 0 && unconfirmedNames.length === 0){
cameraConfig.cameras.forEach(camera => cameraTrackingState.set(camera.id,false))
updateStatus("All off done","ok")
}else if(failedNames.length === 0){
cameraConfig.cameras.forEach(camera => cameraTrackingState.set(camera.id,false))
updateStatus("All off sent (unconfirmed)","warn")
}else{
updateStatus("All off failed","err")
}
}finally{
cameraConfig.cameras.forEach(camera => inFlightCameraIds.delete(camera.id))
renderCameraCards()
}

setTimeout(() => {
refreshLiveTrackingStatus()
}, 1500)
}

loadConfig()
renderCameraCards()
scheduleLiveTrackingStatus()

document.addEventListener("keydown",handleDockHotkeys,{capture:true})

</script>

</body>
</html>
