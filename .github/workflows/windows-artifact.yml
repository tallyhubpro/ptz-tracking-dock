name: Desktop Build Artifacts

on:
  push:
    branches:
      - "**"
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout plugin source
        uses: actions/checkout@v4
        with:
          path: plugin-src

      - name: Checkout OBS Studio 31.1.2
        uses: actions/checkout@v4
        with:
          repository: obsproject/obs-studio
          ref: 31.1.2
          submodules: recursive
          path: obs-studio

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          arch: "win64_msvc2022_64"
          cache: true

      - name: Inject plugin into OBS tree
        shell: pwsh
        run: |
          robocopy plugin-src obs-studio/plugins/ptz-tracking-dock /E /NFL /NDL /NJH /NJS /NP
          if ($LASTEXITCODE -ge 8) { exit $LASTEXITCODE }
          # robocopy uses non-zero success codes (for example 1 = files copied)
          $global:LASTEXITCODE = 0

          $cmakeList = "obs-studio/plugins/CMakeLists.txt"
          $line = "add_subdirectory(ptz-tracking-dock)"
          if (-not (Select-String -Path $cmakeList -Pattern ([regex]::Escape($line)) -Quiet)) {
            Add-Content -Path $cmakeList -Value "`n$line"
          }

      - name: Configure OBS (CMake)
        shell: pwsh
        run: |
          cmake -S obs-studio -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_BROWSER=OFF `
            -DENABLE_SCRIPTING=OFF

      - name: Build plugin target
        shell: pwsh
        run: cmake --build build --config Release --target ptz-tracking-dock --parallel

      - name: Collect plugin artifact
        shell: pwsh
        run: |
          $dll = Get-ChildItem -Path build -Filter ptz-tracking-dock.dll -Recurse | Select-Object -First 1
          if (-not $dll) {
            throw "ptz-tracking-dock.dll not found in build output"
          }

          New-Item -ItemType Directory -Force -Path artifact/obs-plugins/64bit | Out-Null
          Copy-Item $dll.FullName artifact/obs-plugins/64bit/ptz-tracking-dock.dll -Force
          Compress-Archive -Path artifact/obs-plugins -DestinationPath ptz-tracking-dock-windows.zip -Force

      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ptz-tracking-dock-windows
          path: ptz-tracking-dock-windows.zip

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout plugin source
        uses: actions/checkout@v4
        with:
          path: plugin-src

      - name: Checkout OBS Studio 31.1.2
        uses: actions/checkout@v4
        with:
          repository: obsproject/obs-studio
          ref: 31.1.2
          submodules: recursive
          path: obs-studio

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          arch: "clang_64"
          cache: true

      - name: Inject plugin into OBS tree
        run: |
          rsync -a --delete plugin-src/ obs-studio/plugins/ptz-tracking-dock/

          cmake_list="obs-studio/plugins/CMakeLists.txt"
          line="add_subdirectory(ptz-tracking-dock)"
          grep -Fxq "$line" "$cmake_list" || printf "\n%s\n" "$line" >> "$cmake_list"

      - name: Configure OBS (CMake + Xcode)
        run: |
          cmake -S obs-studio -B build -G Xcode \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_BROWSER=OFF \
            -DENABLE_SCRIPTING=OFF

      - name: Build plugin target
        run: cmake --build build --config Release --target ptz-tracking-dock --parallel

      - name: Collect plugin artifact
        run: |
          bundle="$(find build -type d -name 'ptz-tracking-dock.plugin' | head -n 1)"
          if [[ -z "$bundle" ]]; then
            echo "ptz-tracking-dock.plugin not found in build output"
            exit 1
          fi
          /usr/bin/ditto -c -k --sequesterRsrc --keepParent "$bundle" ptz-tracking-dock-macos.zip

      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ptz-tracking-dock-macos
          path: ptz-tracking-dock-macos.zip

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-windows
      - build-macos
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create or update release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release view "$tag" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 || \
            gh release create "$tag" --repo "${GITHUB_REPOSITORY}" --generate-notes
          gh release upload "$tag" \
            dist/ptz-tracking-dock-windows/ptz-tracking-dock-windows.zip \
            dist/ptz-tracking-dock-macos/ptz-tracking-dock-macos.zip \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
